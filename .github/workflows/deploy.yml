name: Deploy to VPS

on:
  push:
    branches:
      - main   # तुझा मुख्य branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add VPS to known_hosts
      run: |
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to VPS
      run: |
        ssh root@${{ secrets.VPS_HOST }} "
          cd /root/bameetech-saasapp-v1 &&
          git pull &&
          cd client &&
          npm install &&
          npm run build &&
          cp -r dist/* /var/www/bameetech/dist/ &&
          pm2 restart all
        "
